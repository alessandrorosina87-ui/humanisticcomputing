name: Deploy to Firebase Hosting
on:
  push:
    branches: [main]

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Project ID
        run: |
          EXPECTED_PROJECT="humanisticcomputing"
          CONFIGURED_PROJECT=$(grep -o '"default": *"[^"]*"' .firebaserc | sed 's/"default": *"//;s/"//')
          if [ "$CONFIGURED_PROJECT" != "$EXPECTED_PROJECT" ]; then
            echo "::error::Project mismatch! Expected '$EXPECTED_PROJECT' but found '$CONFIGURED_PROJECT'"
            exit 1
          fi
          echo "✓ Project verified: $CONFIGURED_PROJECT"

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: humanisticcomputing
